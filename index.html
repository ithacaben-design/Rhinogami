<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhinorigami World</title>
    <style>
        :root {
            --white: #fdfdfd;
            --gray: #4a4a4a;
            --border: 1.5px solid #000;
        }
        body {
            margin: 0; background: #cbd5e0; height: 100vh; overflow: hidden;
            font-family: 'Courier New', Courier, monospace; perspective: 1200px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* The Main Writing Pad - Centered for better UI */
        #pad-container {
            position: relative; margin-top: 20vh;
            width: 220px; height: 220px;
            transform: rotateX(15deg); transform-style: preserve-3d; z-index: 100;
        }
        .pad-sheet {
            position: absolute; width: 100%; height: 100%;
            background: var(--white); border: var(--border);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.1);
        }
        #input-note {
            width: 100%; height: 100%; border: none; padding: 15px;
            box-sizing: border-box; resize: none; outline: none;
            background: transparent; font-weight: bold; font-size: 16px;
        }

        /* The Rhino Entity */
        .rhino {
            position: absolute; width: 80px; height: 80px;
            transform-style: preserve-3d; will-change: transform; pointer-events: none;
        }
        .rhino-body {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d; transform: rotateX(60deg) rotateZ(-45deg);
        }
        .flap {
            position: absolute; width: 100%; height: 100%;
            transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .side {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border: var(--border);
            background: var(--white); display: flex; align-items: center; 
            justify-content: center; font-size: 7px; overflow: hidden;
        }
        .back { background: var(--gray); transform: rotateY(180deg); }

        /* Fold Shapes */
        .f-tl { clip-path: polygon(0 0, 50% 0, 0 50%); transform-origin: 25% 25%; }
        .f-tr { clip-path: polygon(100% 0, 50% 0, 100% 50%); transform-origin: 75% 25%; }
        .f-bl { clip-path: polygon(0 100%, 50% 100%, 0 50%); transform-origin: 25% 75%; }
        .f-br { clip-path: polygon(100% 100%, 50% 100%, 100% 50%); transform-origin: 75% 75%; }

        @keyframes waddle {
            0%, 100% { transform: rotateX(60deg) rotateZ(-45deg) translateY(0); }
            50% { transform: rotateX(70deg) rotateZ(-45deg) translateY(-6px); }
        }
        .walking .rhino-body { animation: waddle 0.4s infinite linear; }

        /* Controls */
        .ui { position: fixed; bottom: 40px; z-index: 1001; }
        button { 
            padding: 16px 32px; cursor: pointer; border-radius: 50px; 
            border: 2px solid #000; background: #fff; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 0 #000;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
    </style>
</head>
<body>

    <div id="pad-container">
        <div class="pad-sheet" style="transform: translateZ(-4px) rotate(1deg)"></div>
        <div class="pad-sheet" style="transform: translateZ(-2px) rotate(-1deg)"></div>
        <div class="pad-sheet">
            <textarea id="input-note" placeholder="Write & release..."></textarea>
        </div>
    </div>

    <div class="ui">
        <button onclick="spawnRhino()">Release Rhino</button>
    </div>

    <script>
        const rhinos = [];
        const speed = 1.5;

        function spawnRhino() {
            const input = document.getElementById('input-note');
            const text = input.value || "Ithaca";
            const el = document.createElement('div');
            el.className = 'rhino';
            
            // Get center position for initial spawn
            const rect = document.getElementById('pad-container').getBoundingClientRect();

            const rhinoData = {
                el: el,
                x: rect.left + (rect.width / 2) - 40,
                y: rect.top + (rect.height / 2) - 40,
                angle: Math.random() * Math.PI * 2,
                size: 80,
                folded: false
            };

            el.innerHTML = `
                <div class="rhino-body">
                    <div class="side">${text}</div>
                    <div class="flap f-tl"><div class="side"></div><div class="side back"></div></div>
                    <div class="flap f-tr"><div class="side"></div><div class="side back"></div></div>
                    <div class="flap f-bl"><div class="side"></div><div class="side back"></div></div>
                    <div class="flap f-br"><div class="side"></div><div class="side back"></div></div>
                </div>`;

            document.body.appendChild(el);
            rhinos.push(rhinoData);

            // Animate fold
            setTimeout(() => {
                el.querySelectorAll('.flap').forEach((f, i) => {
                    const dir = (i % 2 === 0) ? 1 : -1;
                    f.style.transform = `rotate3d(1, ${dir}, 0, 170deg)`;
                });
                el.classList.add('walking');
                rhinoData.folded = true;
            }, 50);

            input.value = '';
        }

        function update() {
            rhinos.forEach(r => {
                if (!r.folded) return;

                r.x += Math.cos(r.angle) * speed;
                r.y += Math.sin(r.angle) * speed;

                // Screen boundary bounce
                if (r.x < 0 || r.x > window.innerWidth - r.size) r.angle = Math.PI - r.angle;
                if (r.y < 0 || r.y > window.innerHeight - r.size) r.angle = -r.angle;

                // Collision Logic
                rhinos.forEach(other => {
                    if (r === other) return;
                    const dx = r.x - other.x;
                    const dy = r.y - other.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < r.size * 0.7) {
                        r.angle += 0.2; // Gentle steer away
                    }
                });

                r.el.style.transform = `translate3d(${r.x}px, ${r.y}px, 0) rotateZ(${r.angle}rad)`;
            });
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
